name: cove

# Cove production stack. Needs a .env next to it (see .env.example).
# Builds the sibling repositories ../cove-server and ../cove-web.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      COVE_DOMAIN: ${COVE_DOMAIN:?set COVE_DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - web-dist:/srv:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      web:
        condition: service_completed_successfully
      server:
        condition: service_started

  # Builds the client bundle into the web-dist volume, then exits.
  web:
    build: ../cove-web
    volumes:
      - web-dist:/dist

  server:
    build: ../cove-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      COVE_DATABASE_URL: postgres://cove:${COVE_DB_PASSWORD:?set COVE_DB_PASSWORD}@db:5432/cove?sslmode=disable
      COVE_LISTEN_ADDR: ":8080"
      COVE_ADMIN_USERNAME: ${COVE_ADMIN_USERNAME:-}
      COVE_OPEN_REGISTRATION: "${COVE_OPEN_REGISTRATION:-false}"
      COVE_STORAGE_PATH: /data/media
      COVE_MAX_UPLOAD_MB: "${COVE_MAX_UPLOAD_MB:-25}"
      # Address handed to the browser: signaling goes through Caddy over TLS.
      COVE_LIVEKIT_URL: wss://${COVE_DOMAIN}/livekit
      COVE_LIVEKIT_API_KEY: ${COVE_LIVEKIT_API_KEY:?set COVE_LIVEKIT_API_KEY}
      COVE_LIVEKIT_API_SECRET: ${COVE_LIVEKIT_API_SECRET:?set COVE_LIVEKIT_API_SECRET}
    volumes:
      - cove-media:/data/media

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cove
      POSTGRES_PASSWORD: ${COVE_DB_PASSWORD:?set COVE_DB_PASSWORD}
      POSTGRES_DB: cove
    volumes:
      - cove-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cove -d cove"]
      interval: 5s
      timeout: 5s
      retries: 10

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    environment:
      # LiveKit format: "key: secret"
      LIVEKIT_KEYS: "${COVE_LIVEKIT_API_KEY}: ${COVE_LIVEKIT_API_SECRET}"
    ports:
      # 7880 is not published: signaling only ever arrives via Caddy over TLS.
      - "7881:7881"                    # TCP fallback for ICE
      - "3478:3478/udp"                # embedded TURN
      - "50000-50060:50000-50060/udp"  # media traffic

volumes:
  cove-db:
  cove-media:
  web-dist:
  caddy-data:
  caddy-config:
